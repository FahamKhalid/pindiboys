services:
  - type: web
    name: pindiboys
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pindiboys-db
          property: connectionString

databases:
  - name: pindiboys-db
    plan: free
