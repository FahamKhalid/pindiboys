<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PindiBoys Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="joinScreen" class="join-screen">
        <div class="join-panel">
          <div class="join-copy">
            <div class="brand-mark">PB</div>
            <h1>PindiBoys</h1>
            <p>Naam likho, avatar choose karo, chat join karo.</p>
          </div>

          <form id="joinForm" class="join-form">
            <label for="nameInput">Name</label>
            <div class="join-row">
              <input
                id="nameInput"
                type="text"
                maxlength="32"
                autocomplete="name"
                placeholder="Ali"
                required
              />
              <button type="submit">Join</button>
            </div>

            <div class="avatar-setup" aria-label="Avatar options">
              <div class="avatar-preview-wrap">
                <div id="avatarPreview" class="avatar avatar-preview">PB</div>
                <label class="upload-button" for="avatarUpload">Image</label>
                <input id="avatarUpload" class="file-input" type="file" accept="image/*" />
              </div>

              <div class="preset-wrap">
                <span>Avatar</span>
                <div class="preset-grid">
                  <button class="preset-avatar active" type="button" data-avatar="initial">None</button>
                  <button class="preset-avatar" type="button" data-avatar="rider">Rider</button>
                  <button class="preset-avatar" type="button" data-avatar="gamer">Gamer</button>
                  <button class="preset-avatar" type="button" data-avatar="star">Star</button>
                  <button class="preset-avatar" type="button" data-avatar="boss">Boss</button>
                </div>
              </div>
            </div>
            <span id="joinError" class="form-error" role="alert"></span>
          </form>
        </div>
      </section>

      <section id="chatScreen" class="chat-screen is-hidden" aria-live="polite">
        <header class="app-header">
          <h1>PindiBoys</h1>
          <div class="app-search">
            <input id="searchInput" type="search" placeholder="Search" />
          </div>
        </header>

        <aside id="sidebar" class="sidebar">
          <div class="sidebar-header">
            <div>
              <h2>Chats</h2>
              <span id="onlineCount">0 online</span>
            </div>
            <button id="createGroupButton" class="create-button" type="button">+ Group</button>
          </div>

          <button id="groupTab" class="chat-tab active" type="button">
            <span class="tab-main">
              <span class="avatar group-avatar">PG</span>
              <span>
                <strong>Pindi Gang</strong>
                <small>Group</small>
              </span>
            </span>
            <span id="groupBadge" class="badge is-hidden">0</span>
          </button>

          <div class="section-title">Online</div>
          <div id="usersList" class="users-list"></div>

          <div class="section-title">Friends</div>
          <div id="friendsList" class="users-list"></div>

          <div class="section-title">Groups</div>
          <div id="customGroupsList" class="users-list"></div>
        </aside>

        <section class="chat-main">
          <header class="chat-header">
            <button id="menuButton" class="icon-button" type="button" aria-label="Open chats">
              <span></span>
              <span></span>
              <span></span>
            </button>

            <div id="chatHeaderAvatar" class="avatar header-avatar">PG</div>
            <div class="header-copy">
              <h2 id="chatTitle">Pindi Gang</h2>
              <p id="chatStatus">Group</p>
            </div>
          </header>

          <div id="messages" class="messages"></div>
          <div id="typingIndicator" class="typing-indicator"></div>

          <form id="messageForm" class="message-form">
            <input
              id="messageInput"
              type="text"
              autocomplete="off"
              placeholder="Say something..."
              maxlength="1000"
            />
            <div class="message-tools">
              <button id="emojiButton" class="tool-button" type="button" aria-label="Emoji">☺</button>
              <button id="voiceButton" class="tool-button" type="button" aria-label="Voice message">Mic</button>
            </div>
            <button class="send-button" type="submit" aria-label="Send message">Send</button>
            <div id="emojiPicker" class="emoji-picker is-hidden" aria-label="Emoji picker"></div>
          </form>
          <div id="recordingStatus" class="recording-status"></div>
        </section>

        <aside id="profilePanel" class="profile-panel">
          <div id="profileAvatar" class="avatar profile-avatar">PB</div>
          <h2 id="profileName">Pindi Gang</h2>
          <p id="profileStatus">Group</p>
          <div id="profileActions" class="profile-actions"></div>
        </aside>
      </section>

      <section id="groupModal" class="modal-backdrop is-hidden" aria-modal="true" role="dialog">
        <form id="groupForm" class="group-modal">
          <div class="modal-header">
            <div>
              <h2>Create Group</h2>
              <p>Select online members.</p>
            </div>
            <button id="closeGroupModal" class="modal-close" type="button" aria-label="Close">x</button>
          </div>

          <label for="groupNameInput">Group name</label>
          <input id="groupNameInput" type="text" maxlength="32" placeholder="Group name" />

          <div class="member-picker-head">
            <strong>Members</strong>
            <span id="memberCount">0 selected</span>
          </div>
          <div id="memberPicker" class="member-picker"></div>

          <span id="groupError" class="form-error" role="alert"></span>
          <button class="modal-submit" type="submit">Save</button>
        </form>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
